trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
- group: aws-dev

- name: AWS_REGION
  value: us-east-1

- name: TF_DIR
  value: 'expenses.tracker'
  
- name: BACKEND_IMAGE
  value: expenses-backend

- name: FRONTEND_IMAGE
  value: expenses-frontend

stages:
- stage: TerraformPlan
  displayName: Terraform Plan
  jobs:
  - job: plan
    displayName: Terraform Plan
    steps:
    - checkout: self

    - script: |
        sudo apt-get update
        sudo apt-get install -y gnupg software-properties-common wget
        wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt-get update
        sudo apt-get install -y terraform
        terraform version
      displayName: Install Terraform

    - script: |
        terraform init
        terraform fmt -check -recursive
        terraform validate
        terraform plan
      displayName: Terraform Init Validate Plan
      workingDirectory: $(TF_DIR)
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: $(AWS_REGION)
        TF_VAR_db_password: $(DB_PASSWORD)
        TF_VAR_acm_certificate_arn: $(ACM_CERTIFICATE_ARN)

- stage: TerraformApply
  displayName: Terraform Apply
  dependsOn: TerraformPlan
  jobs:
  - job: apply
    displayName: Terraform Apply
    steps:
    - checkout: self

    - script: |
        sudo apt-get update
        sudo apt-get install -y gnupg software-properties-common wget
        wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt-get update
        sudo apt-get install -y terraform
        terraform version
      displayName: Install Terraform

    - script: |
        terraform init
        terraform apply -auto-approve
      displayName: Terraform Apply
      workingDirectory: $(TF_DIR)
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: $(AWS_REGION)
        TF_VAR_db_password: $(DB_PASSWORD)
        TF_VAR_acm_certificate_arn: $(ACM_CERTIFICATE_ARN)

- stage: BuildAndPush
  displayName: Build and Push Docker Images
  dependsOn: TerraformApply
  jobs:
  - job: docker
    displayName: Build and Push
    steps:
    - checkout: self

    - script: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        ECR_URL="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

        aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_URL

        docker build -t $BACKEND_IMAGE:latest ./app/backend
        docker tag $BACKEND_IMAGE:latest $ECR_URL/$BACKEND_IMAGE:latest
        docker push $ECR_URL/$BACKEND_IMAGE:latest

        docker build -t $FRONTEND_IMAGE:latest ./app/frontend
        docker tag $FRONTEND_IMAGE:latest $ECR_URL/$FRONTEND_IMAGE:latest
        docker push $ECR_URL/$FRONTEND_IMAGE:latest
      displayName: Build and Push to ECR
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_REGION: $(AWS_REGION)

- stage: DeployECS
  displayName: Force ECS Deployment
  dependsOn: BuildAndPush
  jobs:
  - job: deploy
    displayName: Deploy ECS
    steps:
    - script: |
        aws ecs update-service \
          --cluster expenses-cluster \
          --service expenses-backend-service \
          --force-new-deployment \
          --region $AWS_REGION

        aws ecs update-service \
          --cluster expenses-cluster \
          --service expenses-frontend-service \
          --force-new-deployment \
          --region $AWS_REGION
      displayName: Force New ECS Deployment
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_REGION: $(AWS_REGION)